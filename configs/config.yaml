# ============================================================
# 项目配置文件
# ============================================================

# 数据库配置
database:
  url: "${DATABASE_URL}"
  echo: false
  pool_size: 10
  max_overflow: 20
  pool_timeout: 30
  pool_recycle: 3600

# 向量库配置
vector_db:
  persist_dir: "./chroma_data"
  collection: "knowledge_base"

# LLM 配置
llm:
  api_key: "${LLM_API_KEY}"
  base_url: "https://dashscope.aliyuncs.com/compatible-mode/v1"
  model: "qwen3.5-flash"
  provider: "qwen"

# Embedding 配置
embedding:
  model: "BAAI/bge-m3"
  use_spark: false

# RAG 配置
rag:
  chunk_size: 500
  chunk_overlap: 50

# JWT 配置
jwt:
  secret: "${JWT_SECRET}"
  algorithm: "HS256"
  expire_hours: 24
